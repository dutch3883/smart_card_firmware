; PlatformIO project for the standalone IdeaSpark RFID clock-in device.
;
; Board: classic ESP32 (ESP32-D0WD-V3 confirmed via esptool chip_id).
; Framework: Arduino — easiest library ecosystem for PN532, OLED, WiFi.
;
; Stage 1 (this file): minimal hello-world that proves flash + serial work.
; Layered later (when stage 1 is green):
;   - PN532 driver (Adafruit_PN532) over I2C — read card UIDs
;   - SSD1306 OLED (Adafruit_SSD1306 + Adafruit_GFX) — show feedback
;   - WiFiManager — captive-portal first-time setup per spec 007

[env:esp32dev]
platform     = espressif32
board        = esp32dev
framework    = arduino
; Confirmed via stage-1 boot: this IdeaSpark has 8 MiB flash (default
; esp32dev board profile assumes 4 MiB → switch to an 8 MiB partition
; layout to use the full chip).
board_upload.flash_size = 8MB
board_build.partitions  = default_8MB.csv
; Stage-8 (spec 008) — LittleFS filesystem in the SPIFFS partition slot. Used
; for the offline event queue (`/queue/<event_id>.json`) and the registration
; page HTML served by the device's WebServer.
board_build.filesystem  = littlefs
monitor_speed = 115200
; Upload speed sweet-spot for CH340-bridged boards. 460800 is feasible but
; some CH340 clones drop bytes; 115200 is rock-solid for the hello-world.
upload_speed = 115200
upload_port  = /dev/cu.usbserial-140
monitor_port = /dev/cu.usbserial-140
; Helpful build flags. -DCORE_DEBUG_LEVEL=3 emits Info-level logs from the
; Arduino-ESP32 core — handy for early debugging; drop to 0 later.
; Firmware version stamp. Bumped by `scripts/release_firmware.sh`. Compiled
; into the binary as FIRMWARE_VERSION so the OTA self-update check can
; compare against the published manifest at:
;   https://github.com/dutch3883/smart_card_firmware/blob/main/latest.txt
build_flags  =
    -DCORE_DEBUG_LEVEL=3
    -DFIRMWARE_VERSION=\"v0.2.6\"
; Stage-2 libraries.
; Adafruit_SSD1306 drives the 128×64 OLED found at I²C 0x3C; it depends on
; Adafruit_GFX which PlatformIO pulls in automatically. Pinning to the
; major version so the API stays stable across builds.
lib_deps =
    adafruit/Adafruit SSD1306 @ ^2.5.13
    adafruit/Adafruit GFX Library @ ^1.11.11
; Stage-3 — WiFi captive-portal config (spec 007 US-5).
; WiFiManager by tzapu: handles AP fallback, captive portal w/ DNS hijack,
; persists credentials in NVS, auto-reconnect on boot. Industry standard
; for "no-touch" WiFi onboarding of ESP32 devices.
    https://github.com/tzapu/WiFiManager.git#v2.0.17
; QR code generator — ricmoo/QRCode. Tiny (~10 KB), produces a module grid
; we draw onto the OLED with fillRect. Used to render a WiFi-join QR so the
; operator's phone can hop on the AP without typing the SSID.
    https://github.com/ricmoo/QRCode.git
; Stage-4 — Elechouse NFC Module V3 (PN532) over I²C.
; Adafruit_PN532 is the standard driver; depends on Adafruit_BusIO which
; PlatformIO pulls in automatically. Used for card tap → UID readout.
    adafruit/Adafruit PN532 @ ^1.3.4
; Stage-8 (spec 008) — JSON for the sync API request/response bodies. v7 is
; the current stable major; the new `JsonDocument` API is ergonomic and the
; library is the de-facto standard on ESP32.
    bblanchon/ArduinoJson @ ^7.0.0
; U8g2 text-rendering overlay on top of Adafruit_GFX. Provides Unicode-aware
; print() that can render Thai glyphs when paired with a Thai-capable font
; (e.g. a custom-converted Sarabun/Noto Thai GFX font). The graphics
; primitives (lines, rects, framebuffer) continue to come from
; Adafruit_GFX/Adafruit_SSD1306 — u8g2 only handles text glyph rendering.
    olikraus/U8g2_for_Adafruit_GFX @ ^1.8.0
